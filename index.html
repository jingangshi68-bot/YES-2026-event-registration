<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>活动报名</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a1a;
    --ink-muted: #6b6b6b;
    --ink-faint: #b0b0b0;
    --paper: #f5f2eb;
    --paper-white: #fdfcf9;
    --accent: #c0392b;
    --accent-light: #f9eae8;
    --border: #d8d3c8;
    --success: #27ae60;
    --radius: 3px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Noto Serif SC', serif;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 48px 16px 80px;
  }
  .page { width: 100%; max-width: 620px; }
  .header {
    border-bottom: 2px solid var(--ink);
    padding-bottom: 20px;
    margin-bottom: 36px;
  }
  .header::before {
    content: '';
    display: block;
    width: 40px;
    height: 3px;
    background: var(--accent);
    margin-bottom: 16px;
  }
  .header-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-muted);
    margin-bottom: 8px;
  }
  .header h1 { font-size: 28px; font-weight: 600; line-height: 1.3; }
  .header-sub {
    margin-top: 10px;
    font-size: 13px;
    color: var(--ink-muted);
    font-family: 'DM Mono', monospace;
    line-height: 1.6;
  }
  .privacy-badge {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    background: var(--paper-white);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 7px 12px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--ink-muted);
    margin-bottom: 36px;
  }
  .privacy-badge svg { width: 13px; height: 13px; flex-shrink: 0; }
  .form-group { margin-bottom: 26px; }
  label { display: block; font-size: 13px; font-weight: 600; letter-spacing: 0.03em; margin-bottom: 7px; }
  label .req { color: var(--accent); margin-left: 3px; font-weight: 400; }
  label .hint {
    display: block;
    font-weight: 400;
    font-size: 11px;
    color: var(--ink-faint);
    margin-top: 2px;
    font-family: 'DM Mono', monospace;
  }
  input[type="text"], input[type="email"], textarea {
    width: 100%;
    background: var(--paper-white);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 11px 13px;
    font-family: 'Noto Serif SC', serif;
    font-size: 15px;
    color: var(--ink);
    transition: border-color 0.15s, box-shadow 0.15s;
    outline: none;
  }
  input[type="text"]:focus, input[type="email"]:focus, textarea:focus {
    border-color: var(--ink);
    box-shadow: 0 0 0 3px rgba(26,26,26,0.06);
  }
  input.error, textarea.error {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(192,57,43,0.08);
  }
  textarea { resize: vertical; min-height: 96px; line-height: 1.6; }
  .field-error {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    margin-top: 4px;
    display: none;
  }
  .field-error.visible { display: block; }
  .divider { border: none; border-top: 1px dashed var(--border); margin: 32px 0; }
  .section-title {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 22px;
  }
  .submit-row {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-top: 36px;
    padding-top: 26px;
    border-top: 1px solid var(--border);
  }
  button[type="submit"] {
    background: var(--ink);
    color: var(--paper);
    border: none;
    border-radius: var(--radius);
    padding: 13px 30px;
    font-family: 'Noto Serif SC', serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }
  button[type="submit"]:hover { background: #333; }
  button[type="submit"]:active { transform: scale(0.98); }
  button[type="submit"]:disabled { background: var(--ink-faint); cursor: not-allowed; }
  .spinner {
    display: none;
    width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-left: 8px;
  }
  button[type="submit"].loading .spinner { display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .submit-note {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--ink-faint);
    line-height: 1.5;
  }
  .success-screen {
    display: none;
    text-align: center;
    padding: 70px 0;
    animation: fadeUp 0.5s both;
  }
  .success-screen.visible { display: block; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
  .success-icon {
    width: 54px; height: 54px;
    background: #eafaf1;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
  }
  .success-icon svg { width: 24px; height: 24px; }
  .success-screen h2 { font-size: 22px; font-weight: 600; margin-bottom: 10px; }
  .success-screen p {
    font-size: 13px;
    color: var(--ink-muted);
    font-family: 'DM Mono', monospace;
    line-height: 1.7;
  }
  .ref-code {
    display: inline-block;
    margin-top: 20px;
    background: var(--paper-white);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 8px 18px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.08em;
    color: var(--ink-muted);
  }
  .error-banner {
    display: none;
    background: var(--accent-light);
    border: 1px solid #e8b4af;
    border-radius: var(--radius);
    padding: 11px 14px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    margin-bottom: 20px;
    line-height: 1.5;
  }
  .error-banner.visible { display: block; }
  .passport-note {
    background: var(--paper-white);
    border-left: 2px solid var(--border);
    padding: 8px 12px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--ink-muted);
    margin-top: 8px;
    line-height: 1.6;
  }
</style>
</head>
<body>
<div class="page">

  <div class="header">
    <div class="header-label">Registration Form · 报名表</div>
    <h1>活动报名登记</h1>
    <div class="header-sub">请如实填写以下信息，提交后将由主办方审核确认。</div>
  </div>

  <div class="privacy-badge">
    <svg viewBox="0 0 24 24" fill="none" stroke="#27ae60" stroke-width="2">
      <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
    </svg>
    您的信息经加密提交，其他报名者无法查看您的内容
  </div>

  <div class="error-banner" id="errorBanner"></div>

  <form id="regForm" novalidate>

    <div class="section-title">— 基本信息</div>

    <div class="form-group">
      <label>姓名 <span class="req">*</span>
        <span class="hint">请填写真实姓名（与证件一致）</span>
      </label>
      <input type="text" id="name" placeholder="例：张三" autocomplete="name" />
      <div class="field-error" id="nameErr">请填写姓名</div>
    </div>

    <div class="form-group">
      <label>电子邮箱 <span class="req">*</span>
        <span class="hint">确认函将发送至此地址</span>
      </label>
      <input type="email" id="email" placeholder="example@email.com" autocomplete="email" />
      <div class="field-error" id="emailErr">请填写有效的邮箱地址</div>
    </div>

    <div class="form-group">
      <label>单位 / 学校 <span class="req">*</span></label>
      <input type="text" id="org" placeholder="例：某某大学 · 某某公司" />
      <div class="field-error" id="orgErr">请填写单位或学校名称</div>
    </div>

    <hr class="divider">
    <div class="section-title">— 证件信息</div>

    <div class="form-group">
      <label>护照号码 <span class="req">*</span>
        <span class="hint">仅用于本次活动身份核验，严格保密</span>
      </label>
      <input type="text" id="passport" placeholder="例：E12345678" maxlength="20"
             style="font-family:'DM Mono',monospace;letter-spacing:0.06em;text-transform:uppercase;" />
      <div class="passport-note">此信息将加密存储，仅主办方可查阅，不会对外公开。</div>
      <div class="field-error" id="passportErr">请填写护照号码</div>
    </div>

    <hr class="divider">
    <div class="section-title">— 其他问题</div>

    <div class="form-group">
      <label>您是通过什么渠道了解到本次活动的？
        <span class="hint">选填</span>
      </label>
      <input type="text" id="source" placeholder="例：朋友推荐、微信公众号、官方网站…" />
    </div>

    <div class="form-group">
      <label>您对本次活动有何期待或需要补充说明的事项？
        <span class="hint">选填</span>
      </label>
      <textarea id="remarks" placeholder="请填写您的期待、特殊需求或其他说明…"></textarea>
    </div>

    <div class="submit-row">
      <button type="submit" id="submitBtn">
        <span class="btn-text">提交报名</span>
        <span class="spinner"></span>
      </button>
      <div class="submit-note">
        提交即视为同意<br>主办方隐私保护政策
      </div>
    </div>

  </form>

  <div class="success-screen" id="successScreen">
    <div class="success-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#27ae60" stroke-width="2.5">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
    <h2>报名成功！</h2>
    <p>您的报名信息已收到，<br>确认函将发送至您填写的邮箱地址。</p>
    <div class="ref-code" id="refCode"></div>
  </div>

</div>
<script>
// ================================================================
// ⚙️  配置 — 替换为您的 Apps Script 网址
// ================================================================
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbytfm1iIGlPVIbd3UsDi6ouITfUDwOaSiqAlLkKb4v9b4AFry3OOohZ3GfbuAGfQqIlGg/exec";
// ================================================================

const form = document.getElementById('regForm');
const submitBtn = document.getElementById('submitBtn');
const errorBanner = document.getElementById('errorBanner');

function setFieldError(id, errId, hasError) {
  document.getElementById(id).classList.toggle('error', hasError);
  document.getElementById(errId).classList.toggle('visible', hasError);
  return !hasError;
}

function validate() {
  const emailRe = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  let ok = true;
  ok = setFieldError('name',     'nameErr',     !document.getElementById('name').value.trim()) && ok;
  ok = setFieldError('email',    'emailErr',    !emailRe.test(document.getElementById('email').value.trim())) && ok;
  ok = setFieldError('org',      'orgErr',      !document.getElementById('org').value.trim()) && ok;
  ok = setFieldError('passport', 'passportErr', !document.getElementById('passport').value.trim()) && ok;
  return ok;
}

['name','email','org','passport'].forEach(id => {
  document.getElementById(id).addEventListener('input', () => {
    document.getElementById(id).classList.remove('error');
    const e = document.getElementById(id + 'Err');
    if (e) e.classList.remove('visible');
  });
});

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  errorBanner.classList.remove('visible');
  if (!validate()) return;

  submitBtn.disabled = true;
  submitBtn.classList.add('loading');

  const payload = {
    name:      document.getElementById('name').value.trim(),
    email:     document.getElementById('email').value.trim(),
    org:       document.getElementById('org').value.trim(),
    passport:  document.getElementById('passport').value.trim().toUpperCase(),
    source:    document.getElementById('source').value.trim(),
    remarks:   document.getElementById('remarks').value.trim(),
    timestamp: new Date().toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai' }),
  };

  try {
    const res = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify(payload),
    });
    const data = await res.json();
    if (data.status === 'ok') {
      form.style.display = 'none';
      document.getElementById('successScreen').classList.add('visible');
      document.getElementById('refCode').textContent = '报名编号 ' + (data.ref || genRef());
    } else {
      throw new Error(data.message || '服务器返回错误');
    }
  } catch (err) {
    errorBanner.textContent = '提交时发生错误，请稍后重试。错误信息：' + err.message;
    errorBanner.classList.add('visible');
    submitBtn.disabled = false;
    submitBtn.classList.remove('loading');
  }
});

function genRef() {
  return 'REG-' + Date.now().toString(36).toUpperCase();
}
</script>
</body>
</html>
